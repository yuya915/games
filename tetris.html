<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テトリス</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100dvh;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    padding: 8px;
  }
  .container {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }
  canvas {
    border: 2px solid #444;
    display: block;
  }
  .panel {
    width: 130px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .panel-box {
    background: #16213e;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 12px;
  }
  .panel-box h3 {
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .panel-box .value {
    font-size: 22px;
    font-weight: bold;
    color: #00d4ff;
  }
  #next-canvas {
    display: block;
    margin-top: 8px;
  }
  .controls {
    font-size: 12px;
    color: #888;
    line-height: 1.8;
  }
  .controls span {
    color: #ccc;
  }
  #board-wrap {
    position: relative;
    display: inline-block;
  }
  .ov-btn {
    display: none;
  }
  .btn-quit {
    padding: 8px 16px;
    font-size: 13px;
    background: transparent;
    color: #888;
    border: 1px solid #444;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.15s, color 0.15s;
  }
  .btn-quit:hover {
    background: #ff4444;
    color: #fff;
    border-color: #ff4444;
  }
  .btn-back {
    margin-top: 4px;
    padding: 10px 30px;
    font-size: 14px;
    background: transparent;
    color: #888;
    border: 1px solid #666;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }
  .btn-back:hover {
    background: #333;
    color: #fff;
  }
  .mobile-hint { display: none; }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 16px;
    z-index: 10;
  }
  #overlay h2 { font-size: 36px; color: #ff4444; }
  #overlay p  { color: #ccc; }
  #overlay button {
    margin-top: 8px;
    padding: 10px 30px;
    font-size: 16px;
    background: #00d4ff;
    color: #000;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }
  #overlay button:hover { background: #00aacc; }
  #start-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 16px;
    z-index: 10;
  }
  #start-overlay h1 { font-size: 48px; color: #00d4ff; letter-spacing: 4px; }
  #start-overlay button {
    padding: 12px 40px;
    font-size: 18px;
    background: #00d4ff;
    color: #000;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
  }
  #start-overlay button:hover { background: #00aacc; }

  @media (max-width: 560px) {
    .container {
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .panel {
      order: 2;
      width: auto;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    #board-wrap {
      order: 1;
    }
    .panel-box {
      padding: 8px 12px;
      min-width: 80px;
    }
    .desktop-hint { display: none; }
    .mobile-hint  { display: block; }
    #next-canvas {
      width: 80px;
      height: 45px;
    }
    .ov-btn {
      display: block;
      position: absolute;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      padding: 8px 12px;
      z-index: 5;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }
    .ov-btn:active {
      background: rgba(255,255,255,0.3);
    }
    #btn-rotate { top: 8px; left: 8px; }
    #btn-hard   { top: 8px; right: 8px; }
    #btn-left   { bottom: 8px; left: 8px; }
    #btn-down   { bottom: 8px; left: 50%; transform: translateX(-50%); }
    #btn-right  { bottom: 8px; right: 8px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="panel">
    <div class="panel-box">
      <h3>スコア</h3>
      <div class="value" id="score">0</div>
    </div>
    <div class="panel-box">
      <h3>ライン</h3>
      <div class="value" id="lines">0</div>
    </div>
    <div class="panel-box">
      <h3>レベル</h3>
      <div class="value" id="level">1</div>
    </div>
    <div class="panel-box">
      <h3>NEXT</h3>
      <canvas id="next-canvas" width="110" height="80"></canvas>
    </div>
    <div class="panel-box desktop-hint controls">
      <h3 style="margin-bottom:8px">操作</h3>
      <div><span>← →</span> 移動</div>
      <div><span>↑</span> 回転</div>
      <div><span>↓</span> 下へ</div>
      <div><span>Space</span> 落下</div>
      <div><span>P</span> ポーズ</div>
    </div>
    <div class="panel-box mobile-hint controls">
      <h3 style="margin-bottom:8px">操作</h3>
      <div><span>タップ</span> 回転</div>
      <div><span>←→ 払い</span> 移動</div>
      <div><span>↓ ゆっくり</span> 下へ</div>
      <div><span>↓ 素早く</span> 落下</div>
    </div>
    <button class="btn-quit" onclick="location.href='index.html'">ゲーム終了</button>
  </div>
  <div id="board-wrap">
    <canvas id="board"></canvas>
    <button class="ov-btn" id="btn-rotate">↑回転</button>
    <button class="ov-btn" id="btn-hard">HARD</button>
    <button class="ov-btn" id="btn-left">←</button>
    <button class="ov-btn" id="btn-down">↓</button>
    <button class="ov-btn" id="btn-right">→</button>
  </div>
</div>

<div id="start-overlay">
  <h1>TETRIS</h1>
  <button onclick="startGame()">スタート</button>
</div>

<div id="overlay" style="display:none">
  <h2>GAME OVER</h2>
  <p id="final-score"></p>
  <button onclick="startGame()">もう一度</button>
  <button class="btn-back" onclick="location.href='index.html'">ゲーム一覧に戻る</button>
</div>

<script>
const COLS = 10, ROWS = 20;
const isMobile = window.innerWidth <= 560;
const sizeByW = Math.floor((window.innerWidth - 20) / COLS);
const sizeByH = isMobile
  ? Math.floor((window.innerHeight - 130) / ROWS)
  : Math.floor((window.innerHeight - 40) / ROWS);
const SIZE = Math.max(Math.min(sizeByW, sizeByH, 30), 18);

const canvas = document.getElementById('board');
canvas.width  = SIZE * COLS;
canvas.height = SIZE * ROWS;
const ctx = canvas.getContext('2d');

const nextCanvas = document.getElementById('next-canvas');
const nctx = nextCanvas.getContext('2d');

const COLORS = {
  I: '#00d4ff', O: '#ffd700', T: '#aa00ff',
  S: '#00e676', Z: '#ff1744', J: '#2979ff', L: '#ff6d00'
};

const SHAPES = {
  I: [[1,1,1,1]],
  O: [[1,1],[1,1]],
  T: [[0,1,0],[1,1,1]],
  S: [[0,1,1],[1,1,0]],
  Z: [[1,1,0],[0,1,1]],
  J: [[1,0,0],[1,1,1]],
  L: [[0,0,1],[1,1,1]],
};

let board, current, next, score, lines, level, gameOver, paused, lastTime, fallAcc, animId;

function newBoard() {
  return Array.from({length: ROWS}, () => Array(COLS).fill(null));
}

// 7-bagランダマイザー
let bag = [];
function refillBag() {
  bag = Object.keys(SHAPES);
  for (let i = bag.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [bag[i], bag[j]] = [bag[j], bag[i]];
  }
}
function randomPiece() {
  if (bag.length === 0) refillBag();
  const key = bag.pop();
  return {
    shape: SHAPES[key].map(r => [...r]),
    color: COLORS[key],
    x: Math.floor(COLS / 2) - Math.floor(SHAPES[key][0].length / 2),
    y: 0
  };
}

function rotate(shape) {
  return shape[0].map((_, i) => shape.map(r => r[i]).reverse());
}

function valid(piece, dx=0, dy=0, shape=null) {
  const s = shape || piece.shape;
  for (let r = 0; r < s.length; r++) {
    for (let c = 0; c < s[r].length; c++) {
      if (!s[r][c]) continue;
      const nx = piece.x + c + dx;
      const ny = piece.y + r + dy;
      if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
      if (ny >= 0 && board[ny][nx]) return false;
    }
  }
  return true;
}

function lock() {
  current.shape.forEach((row, r) => {
    row.forEach((cell, c) => {
      if (cell) {
        const y = current.y + r;
        if (y < 0) { gameOver = true; return; }
        board[y][current.x + c] = current.color;
      }
    });
  });
  clearLines();
  current = next;
  next = randomPiece();
  if (!valid(current)) gameOver = true;
}

function clearLines() {
  const full = [];
  for (let r = 0; r < ROWS; r++) {
    if (board[r].every(c => c !== null)) full.push(r);
  }
  if (!full.length) return;

  const pts = [0, 100, 300, 500, 800];
  score += pts[full.length] * level;
  lines += full.length;
  level = Math.floor(lines / 10) + 1;

  for (let i = full.length - 1; i >= 0; i--) {
    board.splice(full[i], 1);
  }
  while (board.length < ROWS) board.unshift(Array(COLS).fill(null));
  updateHUD();
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('lines').textContent = lines;
  document.getElementById('level').textContent = level;
}

function fallSpeed() {
  return Math.max(80, 500 - (level - 1) * 45);
}

function ghostY() {
  let gy = current.y;
  while (valid(current, 0, gy - current.y + 1)) gy++;
  return gy;
}

function drawBlock(context, x, y, color, size=SIZE, alpha=1) {
  context.globalAlpha = alpha;
  context.fillStyle = color;
  context.fillRect(x * size, y * size, size - 1, size - 1);
  context.fillStyle = 'rgba(255,255,255,0.2)';
  context.fillRect(x * size, y * size, size - 1, 4);
  context.fillRect(x * size, y * size, 4, size - 1);
  context.globalAlpha = 1;
}

function draw() {
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.strokeRect(c * SIZE, r * SIZE, SIZE, SIZE);
    }
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) drawBlock(ctx, c, r, board[r][c]);
    }
  }

  const gy = ghostY();
  if (gy !== current.y) {
    current.shape.forEach((row, r) => {
      row.forEach((cell, c) => {
        if (cell) {
          ctx.globalAlpha = 0.25;
          ctx.fillStyle = current.color;
          ctx.fillRect((current.x + c) * SIZE, (gy + r) * SIZE, SIZE - 1, SIZE - 1);
          ctx.globalAlpha = 1;
        }
      });
    });
  }

  current.shape.forEach((row, r) => {
    row.forEach((cell, c) => {
      if (cell) drawBlock(ctx, current.x + c, current.y + r, current.color);
    });
  });

  nctx.fillStyle = '#16213e';
  nctx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
  const ns = 22;
  const ox = Math.floor((nextCanvas.width - next.shape[0].length * ns) / 2);
  const oy = Math.floor((nextCanvas.height - next.shape.length * ns) / 2);
  next.shape.forEach((row, r) => {
    row.forEach((cell, c) => {
      if (cell) {
        nctx.fillStyle = next.color;
        nctx.fillRect(ox + c * ns, oy + r * ns, ns - 1, ns - 1);
        nctx.fillStyle = 'rgba(255,255,255,0.2)';
        nctx.fillRect(ox + c * ns, oy + r * ns, ns - 1, 3);
        nctx.fillRect(ox + c * ns, oy + r * ns, 3, ns - 1);
      }
    });
  });
}

function loop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  if (!paused && !gameOver) {
    fallAcc += dt;
    if (fallAcc >= fallSpeed()) {
      fallAcc = 0;
      if (valid(current, 0, 1)) current.y++;
      else lock();
    }
  }

  draw();

  if (gameOver) {
    document.getElementById('final-score').textContent = `スコア: ${score}　ライン: ${lines}`;
    document.getElementById('overlay').style.display = 'flex';
    return;
  }

  animId = requestAnimationFrame(loop);
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('start-overlay').style.display = 'none';
  board = newBoard();
  bag = [];
  current = randomPiece();
  next = randomPiece();
  score = 0; lines = 0; level = 1;
  gameOver = false; paused = false;
  fallAcc = 0; lastTime = null;
  updateHUD();
  cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
}

// キーボード操作
document.addEventListener('keydown', e => {
  if (gameOver) return;
  switch(e.key) {
    case 'ArrowLeft':  e.preventDefault(); if (valid(current, -1)) current.x--; break;
    case 'ArrowRight': e.preventDefault(); if (valid(current,  1)) current.x++; break;
    case 'ArrowDown':  e.preventDefault();
      if (valid(current, 0, 1)) { current.y++; fallAcc = 0; }
      else lock();
      break;
    case 'ArrowUp':
      e.preventDefault();
      const rot = rotate(current.shape);
      if (valid(current, 0, 0, rot)) current.shape = rot;
      break;
    case ' ':
      e.preventDefault();
      while (valid(current, 0, 1)) current.y++;
      lock();
      break;
    case 'p': case 'P':
      paused = !paused;
      if (!paused) { lastTime = null; animId = requestAnimationFrame(loop); }
      break;
  }
});

// タッチジェスチャー操作
(function setupGestures() {
  let startX, startY, startTime, lastX, dragAccum;

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    startX = lastX = t.clientX;
    startY = t.clientY;
    startTime = Date.now();
    dragAccum = 0;
  }, {passive: false});

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!current || gameOver || paused) return;
    const t = e.touches[0];
    dragAccum += t.clientX - lastX;
    lastX = t.clientX;
    while (dragAccum >= SIZE)  { if (valid(current,  1)) current.x++; dragAccum -= SIZE; }
    while (dragAccum <= -SIZE) { if (valid(current, -1)) current.x--; dragAccum += SIZE; }
  }, {passive: false});

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (!current || gameOver || paused) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const dt = Date.now() - startTime;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);

    if (absDx < 10 && absDy < 10) {
      // タップ → 回転
      const rot = rotate(current.shape);
      if (valid(current, 0, 0, rot)) current.shape = rot;
    } else if (absDy > absDx && dy > 30) {
      // 下スワイプ
      if (absDy / dt >= 0.5) {
        // 素早い → ハードドロップ
        while (valid(current, 0, 1)) current.y++;
        lock();
      } else {
        // ゆっくり → ソフトドロップ1段
        if (valid(current, 0, 1)) { current.y++; fallAcc = 0; }
        else lock();
      }
    }
  }, {passive: false});
})();

// オーバーレイボタン操作
(function setupOverlayButtons() {
  const ids = ['btn-rotate','btn-hard','btn-left','btn-down','btn-right'];
  const actions = {
    'btn-rotate': () => {
      const rot = rotate(current.shape);
      if (valid(current, 0, 0, rot)) current.shape = rot;
    },
    'btn-hard': () => {
      while (valid(current, 0, 1)) current.y++;
      lock();
    },
    'btn-left': () => { if (valid(current, -1)) current.x--; },
    'btn-down': () => {
      if (valid(current, 0, 1)) { current.y++; fallAcc = 0; }
      else lock();
    },
    'btn-right': () => { if (valid(current, 1)) current.x++; },
  };
  ids.forEach(id => {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.addEventListener('touchstart', e => {
      e.preventDefault();
      e.stopPropagation();
      if (!current || gameOver || paused) return;
      actions[id]();
    }, {passive: false});
    btn.addEventListener('mousedown', e => {
      e.preventDefault();
      e.stopPropagation();
      if (!current || gameOver || paused) return;
      actions[id]();
    });
  });
})();
</script>
</body>
</html>
