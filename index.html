<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ブラウザゲーム集</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    min-height: 100vh;
    padding: 40px 20px;
  }
  h1 {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    margin-bottom: 48px;
    font-size: 0.9rem;
  }
  .games {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
    max-width: 900px;
    margin: 0 auto;
  }
  .card {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 12px;
    width: 200px;
    padding: 28px 20px;
    text-align: center;
    text-decoration: none;
    color: white;
    transition: transform 0.15s, border-color 0.15s;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: #e94560;
  }
  .card .icon {
    font-size: 3rem;
    margin-bottom: 12px;
  }
  .card .name {
    font-size: 1.1rem;
    font-weight: bold;
    margin-bottom: 6px;
  }
  .card .desc {
    font-size: 0.8rem;
    color: #888;
  }
</style>
</head>
<body>
<h1>ブラウザゲーム集</h1>
<p class="subtitle">ここで作ったゲームたち</p>
<div class="games">
  <a class="card" href="tetris.html">
    <div class="icon">🧩</div>
    <div class="name">テトリス</div>
    <div class="desc">定番落ち物パズル</div>
  </a>
  <a class="card" href="spin-gunman.html">
    <div class="icon">🔫</div>
    <div class="name">スピン・ガンマン</div>
    <div class="desc">回転する銃で敵を狙い撃て</div>
  </a>
</div>
</body>
</html>
